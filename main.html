<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<title>HTML Element Type</title>
</head>

<body>
	<!-- the entire body must be written by student -->
	<div>
		<button data-ns-test="block-inline-Button">Button1</button>
		<button data-ns-test="block-inline-Button">Button2</button>
	<p>Answer:Inline</p>
	</div>
	
    <div>
	<div data-ns-test="block-inline-div">Div1</div>
	<div data-ns-test="block-inline-div">Div2</div>
	<p>Answer:Block</p>
    </div> 

	<div>
	<span data-ns-test="block-inline-span">Span1</span>
	<span data-ns-test="block-inline-span">Span2</span>
	<p>Answer:Inline</p>
    </div> 

	<div>
	<p data-ns-test="block-inline-input">Paragraph1</p>
	<p data-ns-test="block-inline-input">Paragraph2</p>
	<p>Answer:Block</p>
	</div>	

	<div>
		<input data-ns-test="block-inline-input" type="text">
		<input data-ns-test="block-inline-input" type="text">
		<p>Answer:Inline</p>
	</div>

	<div>
		<cite data-ns-test="block-inline-cite">Citation1</cite>
		<cite data-ns-test="block-inline-cite">Citation2</cite>
		<p>Answer:Inline</p>
	</div>

	<div>
		<code data-ns-test="block-inline-code">code1</code>
		<code data-ns-test="block-inline-code">code2</code>
		<p>Answer:Inline</p>
	</div>

	<div>
		<h1 data-ns-test="block-inline-h1">heading1</h1>
		<h1 data-ns-test="block-inline-h1">heading2</h1>
		<p>Answer:Block</p>
	</div>

	<div>
		<sup data-ns-test="block-inline-sup">Sup1</sup>
		<sup data-ns-test="block-inline-sup">Sup2</sup>
		<p>Answer:Inline</p>
	</div>

	<div>
		<sub data-ns-test="block-inline-sub">Sub1</sub>
		<sub data-ns-test="block-inline-sub">Sub2</sub>
		<p>Answer:Inline</p>
	</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
